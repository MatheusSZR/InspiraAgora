<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InspiraAgora • Frases Motivacionais</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<main class="app">
    <header class="hero">
        <h1>InspiraAgora</h1>
        <p class="subtitle">Seu impulso diário de motivação ✨</p>
    </header>

    <section class="quote-card" aria-live="polite">
        <div id="quote-container" class="fade-in">
            <p id="quote-text">Carregando frase...</p>
            <p id="quote-author"></p>
        </div>
    </section>

    <section class="controls">
        <button id="new-quote-btn" class="btn"><i class="fa-solid fa-rotate-right"></i> Nova frase</button>
        <button id="copy-btn" class="btn btn-secondary"><i class="fa-regular fa-copy"></i> Copiar</button>
        <button id="whatsapp-btn" class="btn btn-whatsapp"><i class="fa-brands fa-whatsapp"></i> WhatsApp</button>
        <button id="twitter-btn" class="btn btn-twitter"><i class="fa-brands fa-x-twitter"></i> Postar</button>
    </section>

    <p id="status" class="status" role="status"></p>
</main>

<script src="app.js"></script>
</body>
</html>
