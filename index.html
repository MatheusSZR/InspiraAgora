<!DOCTYPE html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InspiraAgora • Frases Motivacionais</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="app">
        <header class="hero">
            <h1>InspiraAgora</h1>
            <p class="subtitle">Seu impulso diário de motivação ✨</p>
        </header>

        <section class="quote-card" aria-live="polite">
            <p id="quote-text">Clique no botão para receber uma frase motivacional.</p>
            <p id="quote-author"></p>
        </section>

        <section class="controls">
            <button id="new-quote-btn" class="btn">Nova frase</button>
            <button id="copy-btn" class="btn btn-secondary">Copiar frase</button>
        </section>

        <p id="status" class="status" role="status"></p>
    </main>

    { text: "A mente que se abre a uma nova ideia jamais voltará ao seu tamanho original.", author: "Albert Einstein" },
    { text: "Conhece-te a ti mesmo e conhecerás o universo e os deuses.", author: "Sócrates" },
    { text: "A vida não examinada não vale a pena ser vivida.", author: "Sócrates" },
    { text: "Só sei que nada sei.", author: "Sócrates" },

    { text: "Aqueles que não conseguem lembrar o passado estão condenados a repeti-lo.", author: "George Santayana" },
    { text: "A única constante na vida é a mudança.", author: "Heráclito" },
    { text: "Você não pode pisar no mesmo rio duas vezes.", author: "Heráclito" },
    { text: "Viver é a coisa mais rara do mundo. A maioria das pessoas apenas existe.", author: "Oscar Wilde" },
    { text: "O sucesso é ir de fracasso em fracasso sem perder o entusiasmo.", author: "Winston Churchill" },

    { text: "Penso, logo existo.", author: "René Descartes" },
    { text: "Para compreender as pessoas devo tentar ouvir o que elas não estão dizendo.", author: "Clarice Lispector" },

    { text: "A alegria de fazer o bem é a única felicidade verdadeira.", author: "Léon Tolstói" },
    { text: "Não corrigir nossas falhas é o mesmo que cometer novos erros.", author: "Confúcio" },
    { text: "O silêncio é um amigo que nunca trai.", author: "Confúcio" },
    { text: "Se quiseres conhecer o passado, examina o teu presente, que é o resultado; se quiseres conhecer o futuro, examina o teu presente, que é a causa.", author: "Confúcio" },
    { text: "A suprema arte da guerra é derrotar o inimigo sem lutar.", author: "Sun Tzu" },
    { text: "A coragem não é ausência do medo; é a persistência apesar do medo.", author: "Desconhecido" },
    { text: "Faça o que puder, com o que tiver, onde estiver.", author: "Theodore Roosevelt" },
    { text: "A felicidade não é algo pronto. Ela vem de suas próprias ações.", author: "Dalai Lama" },
    { text: "Nossas vidas começam a terminar no dia em que nos calamos sobre as coisas que importam.", author: "Martin Luther King Jr." },
    { text: "Eu tenho um sonho de que um dia esta nação se levantará e viverá o verdadeiro significado de sua crença.", author: "Martin Luther King Jr." },

    { text: "O homem nasce livre, e por toda parte encontra-se acorrentado.", author: "Jean-Jacques Rousseau" },
    { text: "Posso não concordar com nenhuma das palavras que você disser, mas defenderei até a morte o direito de você dizê-las.", author: "Evelyn Beatrice Hall (Atribuído a Voltaire)" },

    { text: "Acredite em si próprio e chegará um dia em que os outros não terão outra escolha senão acreditar com você.", author: "Cynthia Kersey" },
    { text: "Você falha em 100% dos tiros que não dá.", author: "Wayne Gretzky" },
    { text: "Daqui a vinte anos, você estará mais decepcionado com as coisas que não fez do que com as que fez.", author: "Mark Twain" },
    { text: "O segredo de progredir é começar.", author: "Mark Twain" }
];
        const quoteText = document.getElementById("quote-text");
        const quoteAuthor = document.getElementById("quote-author");
        const status = document.getElementById("status");
        const newQuoteBtn = document.getElementById("new-quote-btn");
        const copyBtn = document.getElementById("copy-btn");

        function getRandomQuote() {
            const index = Math.floor(Math.random() * quotes.length);
            return quotes[index];
        }

        function showRandomQuote() {
            const quote = getRandomQuote();
            quoteText.textContent = `“${quote.text}”`;
            quoteAuthor.textContent = `— ${quote.author}`;
            status.textContent = "";
        }

        async function copyQuote() {
            if (!quoteAuthor.textContent) {
                status.textContent = "Gere uma frase antes de copiar.";
                return;
            }

            const fullQuote = `${quoteText.textContent} ${quoteAuthor.textContent}`;

            try {
                await navigator.clipboard.writeText(fullQuote);
                status.textContent = "Frase copiada com sucesso!";
            } catch {
                status.textContent = "Não foi possível copiar automaticamente.";
            }
        }

        newQuoteBtn.addEventListener("click", showRandomQuote);
        copyBtn.addEventListener("click", copyQuote);

        showRandomQuote();
    </script>
</body>
</html>
